name: fleexa
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  animated_toggle_switch: ^0.8.7
  cupertino_icons: ^1.0.8
  fl_chart: ^1.1.1
  flutter:
    sdk: flutter
  flutter_icon_snackbar: ^1.2.1
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: 2.4.7
  flutter_otp_text_field: ^1.5.1+1
  flutter_svg: ^2.2.3
  font_awesome_flutter: ^10.12.0
  go_router: 6.0.0
  smooth_page_indicator: ^2.0.1
  syncfusion_flutter_charts: ^32.1.24
  syncfusion_flutter_gauges: ^32.1.24
  intl: ^0.20.2
  flutter_screenutil: ^5.9.3
  ai_glow: ^0.0.2

dev_dependencies:
  flutter_lints: ^5.0.0
  flutter_test:
    sdk: flutter

flutter_native_splash:
  color: "#111111"
  image: assets/images/letter_logo.png
  branding: assets/images/letter_logo.png
  fullscreen: true
  android_12:
    image: assets/images/letter_icon_android12.png
    icon_background_color: "#111111"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700

flutter_intl:
  enabled: true

flutter_assets:
  assets_path: assets/
  output_path: lib/core/utils/constants
  filename: assets.dart
  field_prefix: null
  classname: AppAssets
